name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r pipeline/requirements.txt ruff==0.8.4 pytest==8.3.4
          pip install --no-deps -e pipeline
      - name: Lint
        run: cd pipeline && ruff check oss_radar
      - name: Test
        run: pytest pipeline/tests -q
