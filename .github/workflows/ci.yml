name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r pipeline/requirements.txt ruff==0.8.4 pytest==8.3.4
          pip install --no-deps -e pipeline
          # dashboard runtime + TestClient HTTP dep for the API smoke tests
          pip install -r dashboard/requirements.txt httpx==0.28.1
      - name: Lint
        run: cd pipeline && ruff check oss_radar
      - name: Validation gate (leak guard — blocks merge if the gate regresses)
        run: pytest pipeline/tests/test_validation_gate.py -q
      - name: Test pipeline
        run: pytest pipeline/tests -q
      - name: Test dashboard
        run: pytest dashboard/tests -q
