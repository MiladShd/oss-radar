name: PR Preview

# Lets contributors "run a PR": the pipeline executes on the branch against free public
# data sources and a local DuckDB warehouse, then posts the resulting momentum/risk movers
# back as a PR comment. No cloud credentials required.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r pipeline/requirements.txt
          pip install --no-deps -e pipeline
      - name: Run pipeline (dry-run · 8 packages · DuckDB)
        env:
          OSS_RADAR_BACKEND: duckdb
          OSS_RADAR_DUCKDB_PATH: preview.duckdb
          OSS_RADAR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m oss_radar.cli run --dry-run --limit 8
      - name: Build comment
        env:
          OSS_RADAR_BACKEND: duckdb
          OSS_RADAR_DUCKDB_PATH: preview.duckdb
        run: python scripts/pr_comment.py
      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('preview_comment.md', 'utf8');
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body,
            });
